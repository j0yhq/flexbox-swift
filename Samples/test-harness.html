<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlexLayout Samples — Web Test Harness</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #f0f0f5;
      color: #1c1c1e;
    }

    /* ── Page shell ─────────────────────────────────────────── */
    .harness {
      display: flex;
      flex-direction: row;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar: sample picker ─────────────────────────────── */
    .sample-list {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      flex-basis: 220px;
      overflow: scroll;
      background: #fff;
      border-right: 1px solid #e0e0e0;
      padding: 12px 8px;
      gap: 2px;
    }

    .sample-list h2 {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 4px 8px 8px;
    }

    .sample-btn {
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 12.5px;
      color: #333;
      font-family: inherit;
    }
    .sample-btn:hover { background: #f0f0f5; }
    .sample-btn.active { background: #007aff18; color: #007aff; font-weight: 600; }

    /* ── Right side ─────────────────────────────────────────── */
    .right {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      overflow: hidden;
    }

    /* ── Toolbar ─────────────────────────────────────────────── */
    .toolbar {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      height: 48px;
      padding: 0 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
    }

    .toolbar span { font-size: 12px; color: #888; }

    .width-presets {
      display: flex;
      gap: 6px;
    }

    .wp-btn {
      background: #f0f0f5;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      font-family: monospace;
    }
    .wp-btn:hover { background: #e0e0ea; }
    .wp-btn.active { background: #007aff; color: #fff; border-color: #007aff; }

    .toolbar-btn {
      background: #f0f0f5;
      border: 1px solid #d0d0da;
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      color: #333;
      transition: background .15s, color .15s, border-color .15s;
    }
    .toolbar-btn:hover { background: #e0e0ea; }
    .toolbar-btn.success { background: #30d158; color: #fff; border-color: #30d158; }
    .toolbar-btn.primary { background: #007aff; color: #fff; border-color: #007aff; }
    .toolbar-btn.primary:hover { background: #0066dd; }
    .toolbar-btns { margin-left: auto; display: flex; gap: 6px; }

    /* ── CSS Editor overlay ──────────────────────────────── */
    .css-editor-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.4);
      align-items: center;
      justify-content: center;
    }
    .css-editor-overlay.open { display: flex; }
    .css-editor-panel {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
      width: 600px;
      max-width: 90vw;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .css-editor-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid #e0e0e0;
    }
    .css-editor-header h3 { margin: 0; font-size: 14px; flex-grow: 1; }
    .css-editor-textarea {
      flex: 1;
      border: none;
      outline: none;
      padding: 14px;
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 12px;
      line-height: 1.5;
      resize: none;
      min-height: 300px;
    }
    .css-editor-footer {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      border-top: 1px solid #e0e0e0;
      justify-content: flex-end;
    }

    /* ── Canvas area ─────────────────────────────────────────── */
    .canvas-wrap {
      flex-grow: 1;
      overflow: auto;
      padding: 24px;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }

    .canvas-frame {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.10);
      overflow: hidden;
      transition: width .2s ease;
      min-height: 200px;
    }

    /* ── Placeholder colors for demo blocks ──────────────────── */
    .demo-block {
      background: #d0e8ff;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-family: monospace;
      color: #005aaa;
      font-weight: 600;
      padding: 4px;
      text-align: center;
      min-height: 24px;
      overflow: hidden;
    }

    .demo-block:nth-child(odd)  { background: #fde8c8; color: #a05000; }
    .demo-block:nth-child(even) { background: #d4f0d4; color: #006600; }
    .demo-block:nth-child(3n)   { background: #ede0ff; color: #6600cc; }
  </style>
</head>
<body>

<div class="harness">

  <!-- Sidebar -->
  <nav class="sample-list">
    <h2>Samples</h2>
    <button class="sample-btn active" data-sample="navbar">01 · Navbar</button>
    <button class="sample-btn" data-sample="sidebar">02 · Sidebar Layout</button>
    <button class="sample-btn" data-sample="cardgrid">03 · Card Grid</button>
    <button class="sample-btn" data-sample="holygrail">04 · Holy Grail</button>
    <button class="sample-btn" data-sample="dashboard">05 · Dashboard</button>
    <button class="sample-btn" data-sample="absolute">06 · Absolute + Z-Index</button>
    <button class="sample-btn" data-sample="chat">07 · Chat UI</button>
    <button class="sample-btn" data-sample="pricing">08 · Pricing Table</button>
    <button class="sample-btn" data-sample="feed">09 · Media Feed</button>
    <button class="sample-btn" data-sample="product">10 · E-commerce Product</button>
    <button class="sample-btn" data-sample="settings">11 · Settings Page</button>
    <button class="sample-btn" data-sample="overflow">12 · Overflow & Scroll</button>
  </nav>

  <!-- Right -->
  <div class="right">
    <div class="toolbar">
      <span>Canvas width:</span>
      <div class="width-presets">
        <button class="wp-btn active" data-width="100%">Full</button>
        <button class="wp-btn" data-width="1280px">1280</button>
        <button class="wp-btn" data-width="1024px">1024</button>
        <button class="wp-btn" data-width="768px">768</button>
        <button class="wp-btn" data-width="375px">375</button>
      </div>
      <div class="toolbar-btns">
        <button class="toolbar-btn" id="copyCssBtn">Copy CSS</button>
        <button class="toolbar-btn" id="pasteCssBtn">Paste CSS</button>
        <button class="toolbar-btn primary" id="editCssBtn">Edit CSS</button>
      </div>
    </div>

    <div class="canvas-wrap">
      <div class="canvas-frame" id="canvas" style="width:100%">
        <!-- Sample HTML injected here by JS -->
      </div>
    </div>
  </div>

</div>

<!-- CSS Editor Overlay -->
<div class="css-editor-overlay" id="cssEditorOverlay">
  <div class="css-editor-panel">
    <div class="css-editor-header">
      <h3>Edit CSS</h3>
      <button class="toolbar-btn" id="editorCopyBtn">Copy</button>
      <button class="toolbar-btn" id="editorPasteBtn">Paste</button>
    </div>
    <textarea class="css-editor-textarea" id="cssEditorTextarea" spellcheck="false"></textarea>
    <div class="css-editor-footer">
      <button class="toolbar-btn" id="editorCancelBtn">Cancel</button>
      <button class="toolbar-btn primary" id="editorApplyBtn">Apply & Preview</button>
    </div>
  </div>
</div>

<script>

// ── Harness logic ──────────────────────────────────────────────────────────

let currentStyle = null;
let currentKey = 'navbar';

function loadSample(key) {
  currentKey = key;
  liveCSS = '';  // reset custom CSS when switching samples
  const sample = SAMPLES[key];
  if (!sample) return;

  // Remove previous injected style
  if (currentStyle) currentStyle.remove();

  // Inject CSS
  currentStyle = document.createElement('style');
  currentStyle.textContent = sample.css;
  document.head.appendChild(currentStyle);

  // Inject HTML
  document.getElementById('canvas').innerHTML = sample.html;

  // Update active button
  document.querySelectorAll('.sample-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.sample === key);
  });
}

function setWidth(w) {
  document.getElementById('canvas').style.width = w;
  document.querySelectorAll('.wp-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.width === w);
  });
}

// Wire up buttons
document.querySelectorAll('.sample-btn').forEach(b => {
  b.addEventListener('click', () => loadSample(b.dataset.sample));
});

document.querySelectorAll('.wp-btn').forEach(b => {
  b.addEventListener('click', () => setWidth(b.dataset.width));
});

// ── Current live CSS (may differ from SAMPLES if user edited) ──
let liveCSS = '';

function getCurrentCSS() {
  return liveCSS || (SAMPLES[currentKey]?.css ?? '').trim();
}

function applyCustomCSS(css) {
  liveCSS = css;
  if (currentStyle) currentStyle.remove();
  currentStyle = document.createElement('style');
  currentStyle.textContent = css;
  document.head.appendChild(currentStyle);
}

function flashBtn(btn, text, cls) {
  const orig = btn.textContent;
  btn.textContent = text;
  btn.classList.add(cls);
  setTimeout(() => { btn.textContent = orig; btn.classList.remove(cls); }, 1500);
}

// ── Copy CSS button ──
document.getElementById('copyCssBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(getCurrentCSS()).then(() => {
    flashBtn(document.getElementById('copyCssBtn'), 'Copied!', 'success');
  });
});

// ── Paste CSS button ──
document.getElementById('pasteCssBtn').addEventListener('click', () => {
  navigator.clipboard.readText().then(text => {
    if (!text.trim()) return;
    liveCSS = text.trim();
    applyCustomCSS(liveCSS);
    // Deselect sample buttons since we're using custom CSS
    document.querySelectorAll('.sample-btn').forEach(b => b.classList.remove('active'));
    flashBtn(document.getElementById('pasteCssBtn'), 'Pasted!', 'success');
  });
});

// ── Edit CSS button (opens editor overlay) ──
const overlay = document.getElementById('cssEditorOverlay');
const textarea = document.getElementById('cssEditorTextarea');

document.getElementById('editCssBtn').addEventListener('click', () => {
  textarea.value = getCurrentCSS();
  overlay.classList.add('open');
  setTimeout(() => textarea.focus(), 100);
});

// Close overlay on backdrop click
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) overlay.classList.remove('open');
});

document.getElementById('editorCancelBtn').addEventListener('click', () => {
  overlay.classList.remove('open');
});

document.getElementById('editorApplyBtn').addEventListener('click', () => {
  const css = textarea.value.trim();
  if (css) {
    applyCustomCSS(css);
    document.querySelectorAll('.sample-btn').forEach(b => b.classList.remove('active'));
  }
  overlay.classList.remove('open');
});

document.getElementById('editorCopyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(textarea.value);
  flashBtn(document.getElementById('editorCopyBtn'), 'Copied!', 'success');
});

document.getElementById('editorPasteBtn').addEventListener('click', () => {
  navigator.clipboard.readText().then(text => {
    textarea.value = text;
    flashBtn(document.getElementById('editorPasteBtn'), 'Pasted!', 'success');
  });
});

// Override loadSample to reset liveCSS
const _origLoadSample = loadSample;
// (already defined above — we just need to hook into it)

// Load first sample
loadSample('navbar');
</script>
